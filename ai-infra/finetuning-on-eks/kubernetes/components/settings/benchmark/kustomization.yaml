apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Benchmark settings
# Extends TTL so training metrics can be collected from submitter pod logs
# after the job completes. Base TTL is 300s (5 min) for production cleanup;
# benchmarks need 3600s (1 hour) to allow post-run metric extraction.

patches:
  - target:
      kind: RayJob
      name: sft-training-ray
    patch: |-
      - op: replace
        path: /spec/ttlSecondsAfterFinished
        value: 86400
