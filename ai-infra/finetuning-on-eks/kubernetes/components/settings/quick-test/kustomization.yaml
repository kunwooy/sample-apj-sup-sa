apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Quick test settings
# Use subset of data for fast iteration and validation
# Recommended for: Initial setup, debugging, CI/CD

patches:
  - target:
      kind: ConfigMap
      name: ray-training-config
    patch: |-
      - op: replace
        path: /data/max_samples
        value: "100"
      - op: replace
        path: /data/num_epochs
        value: "1"

  # Smaller storage for testing (EFS for HuggingFace cache only, outputs go to S3)
  - target:
      kind: PersistentVolumeClaim
      name: ml-data-efs
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: "100Gi"
