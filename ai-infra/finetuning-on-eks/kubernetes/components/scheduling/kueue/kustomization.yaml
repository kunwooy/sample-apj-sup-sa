apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Kueue integration for RayJob gang scheduling
# - Adds queue-name label for Kueue admission
# - Sets suspend=true so Kueue controls job admission
# - Gang scheduling ensures all workers start atomically

patches:
  - target:
      kind: RayJob
      name: sft-training-ray
    patch: |-
      - op: add
        path: /metadata/labels/kueue.x-k8s.io~1queue-name
        value: "ml-training-local"
      - op: replace
        path: /spec/suspend
        value: true
