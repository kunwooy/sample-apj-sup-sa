apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# QLoRA training configuration
# 4-bit quantization + LoRA adapters
# Most memory efficient - fits larger models on smaller GPUs
# Best for: Single GPU setups, memory-constrained environments
# Note: Not compatible with FSDP or multi-node DDP

patches:
  - target:
      kind: ConfigMap
      name: ray-training-config
    patch: |-
      - op: replace
        path: /data/use_qlora
        value: "true"
      - op: replace
        path: /data/use_fsdp
        value: "false"
      - op: replace
        path: /data/lora_r
        value: "16"
