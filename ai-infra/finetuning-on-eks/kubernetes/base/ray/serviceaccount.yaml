################################################################################
# ServiceAccount for Ray Training Pods
################################################################################
# Uses IRSA (IAM Roles for Service Accounts) to provide S3 access to training
# pods without embedding credentials.
#
# The annotation is a placeholder - use the s3 component to patch with actual
# role ARN from Terraform outputs.
################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-training-sa
  namespace: ml-training
  annotations:
    # PLACEHOLDER: Patched by components/storage/s3 with actual role ARN
    eks.amazonaws.com/role-arn: "PLACEHOLDER_ROLE_ARN"
  labels:
    app: ray-training
    app.kubernetes.io/part-of: fine-tuning-on-eks
